name: Frontend CD

on:
  workflow_run:
    workflows: ["Frontend CI"]
    types: [completed]
    branches: ["main", "develop", "release/**"]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - development
          - staging
          - production

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build deployable artifact
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-dist
          path: dist
          if-no-files-found: error

  deploy-development:
    name: Deploy development environment
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.environment == 'development' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'develop')
    runs-on: ubuntu-latest
    environment:
      name: development

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download deploy artifact
        uses: actions/download-artifact@v8
        with:
          name: deploy-dist
          path: dist

      - name: Deploy to gh-pages/dev
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: dev

  deploy-staging:
    name: Deploy staging environment
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.environment == 'staging' ||
      (github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch == 'main' || startsWith(github.event.workflow_run.head_branch, 'release/'))) ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download deploy artifact
        uses: actions/download-artifact@v8
        with:
          name: deploy-dist
          path: dist

      - name: Deploy to gh-pages/staging
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: staging

  deploy-production:
    name: Promote and deploy to production
    needs: [build, deploy-staging]
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.environment == 'production' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.pages.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download deploy artifact
        uses: actions/download-artifact@v8
        with:
          name: deploy-dist
          path: dist

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: pages
        uses: actions/deploy-pages@v4
